name: Build

on:
  push:
    branches: [ master, main ]
    tags: [ '*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # create/update releases
  packages: read    # read com.willfp:eco / libreforge* from GitHub Packages

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Consumes the Folia forks from GitHub Packages. The libreforge-gradle-plugin bundles
      # libreforge into the final jar at bin/EcoEnchants v<version>.jar.
      - name: Build
        run: ./gradlew build --stacktrace
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        if: github.event_name != 'pull_request'
        id: version
        run: echo "value=$(sed -nE 's/^version[[:space:]]*=[[:space:]]*//p' gradle.properties | head -1)" >> "$GITHUB_OUTPUT"

      # Attaches ONLY the final EcoEnchants plugin jar from bin/ to a release.
      - name: Publish jar to Releases
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          files: bin/*.jar
          fail_on_unmatched_files: true
